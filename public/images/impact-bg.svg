<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="iBg" x1="0" y1="0" x2="1440" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#061528"/>
      <stop offset="50%" stop-color="#0d2240"/>
      <stop offset="100%" stop-color="#041018"/>
    </linearGradient>
    <radialGradient id="iGreenGlow" cx="50%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iBlueGlow" cx="80%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#2196F3" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2196F3" stop-opacity="0"/>
    </radialGradient>
    <filter id="iBlur25"><feGaussianBlur stdDeviation="25"/></filter>
    <filter id="iBlur10"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="iBlur4"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="iGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="1440" height="600" fill="url(#iBg)"/>
  <rect width="1440" height="600" fill="url(#iGreenGlow)"/>
  <rect width="1440" height="600" fill="url(#iBlueGlow)"/>

  <!-- ── Green horizon glow ── -->
  <ellipse cx="720" cy="620" rx="1000" ry="300" fill="#4CAF50" opacity="0.1" filter="url(#iBlur25)"/>
  <ellipse cx="1200" cy="100" rx="400" ry="250" fill="#2196F3" opacity="0.1" filter="url(#iBlur25)"/>

  <!-- ── Rising bar chart (abstract data visualization, left area) ── -->
  <g opacity="0.12" fill="#4CAF50">
    <rect x="80" y="460" width="40" height="100" rx="3"/>
    <rect x="135" y="400" width="40" height="160" rx="3"/>
    <rect x="190" y="340" width="40" height="220" rx="3"/>
    <rect x="245" y="280" width="40" height="280" rx="3"/>
    <rect x="300" y="220" width="40" height="340" rx="3"/>
    <rect x="355" y="160" width="40" height="400" rx="3"/>
    <!-- Highlight bars -->
    <rect x="245" y="280" width="40" height="280" rx="3" fill="#66BB6A" opacity="0.4"/>
    <rect x="355" y="160" width="40" height="400" rx="3" fill="#66BB6A" opacity="0.4"/>
  </g>
  <!-- Bar chart axis lines -->
  <g opacity="0.08" stroke="white" stroke-width="1" fill="none">
    <line x1="70" y1="560" x2="410" y2="560"/>
    <line x1="70" y1="460" x2="410" y2="460"/>
    <line x1="70" y1="360" x2="410" y2="360"/>
    <line x1="70" y1="260" x2="410" y2="260"/>
    <line x1="70" y1="160" x2="410" y2="160"/>
    <line x1="70" y1="160" x2="70" y2="560"/>
  </g>

  <!-- ── Network / connected nodes (center-right) ── -->
  <g opacity="0.12">
    <!-- Connections -->
    <g stroke="#4CAF50" stroke-width="1" fill="none">
      <line x1="720" y1="200" x2="840" y2="280"/>
      <line x1="720" y1="200" x2="680" y2="320"/>
      <line x1="720" y1="200" x2="820" y2="150"/>
      <line x1="840" y1="280" x2="960" y2="240"/>
      <line x1="840" y1="280" x2="880" y2="380"/>
      <line x1="680" y1="320" x2="760" y2="420"/>
      <line x1="680" y1="320" x2="560" y2="360"/>
      <line x1="960" y1="240" x2="1040" y2="310"/>
      <line x1="880" y1="380" x2="960" y2="450"/>
      <line x1="760" y1="420" x2="840" y2="490"/>
      <line x1="560" y1="360" x2="480" y2="440"/>
      <line x1="820" y1="150" x2="920" y2="130"/>
      <line x1="920" y1="130" x2="1020" y2="170"/>
      <line x1="1040" y1="310" x2="1120" y2="360"/>
      <line x1="1120" y1="360" x2="1200" y2="300"/>
    </g>
    <!-- Nodes -->
    <g fill="#4CAF50">
      <circle cx="720" cy="200" r="12"/>
      <circle cx="840" cy="280" r="9"/>
      <circle cx="680" cy="320" r="9"/>
      <circle cx="820" cy="150" r="7"/>
      <circle cx="960" cy="240" r="8"/>
      <circle cx="880" cy="380" r="8"/>
      <circle cx="760" cy="420" r="7"/>
      <circle cx="560" cy="360" r="8"/>
      <circle cx="480" cy="440" r="6"/>
      <circle cx="1040" cy="310" r="7"/>
      <circle cx="960" cy="450" r="6"/>
      <circle cx="840" cy="490" r="6"/>
      <circle cx="920" cy="130" r="7"/>
      <circle cx="1020" cy="170" r="6"/>
      <circle cx="1120" cy="360" r="7"/>
      <circle cx="1200" cy="300" r="8"/>
    </g>
    <!-- Highlighted main node -->
    <circle cx="720" cy="200" r="18" fill="none" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="720" cy="200" r="24" fill="none" stroke="#4CAF50" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- ── Rising trajectory line ── -->
  <g opacity="0.18">
    <polyline points="80,560 180,510 280,470 400,430 520,380 640,320 760,270 880,220 1000,175 1120,140 1240,110 1380,85"
              fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Glow line -->
    <polyline points="80,560 180,510 280,470 400,430 520,380 640,320 760,270 880,220 1000,175 1120,140 1240,110 1380,85"
              fill="none" stroke="#4CAF50" stroke-width="8" stroke-linecap="round" opacity="0.15" filter="url(#iBlur4)"/>
    <!-- Data points -->
    <circle cx="280" cy="470" r="5" fill="#4CAF50"/>
    <circle cx="520" cy="380" r="5" fill="#4CAF50"/>
    <circle cx="760" cy="270" r="6" fill="#66BB6A"/>
    <circle cx="1000" cy="175" r="5" fill="#4CAF50"/>
    <circle cx="1240" cy="110" r="6" fill="#66BB6A"/>
  </g>

  <!-- ── Stars (top area) ── -->
  <g fill="white">
    <circle cx="48" cy="22" r="1.2" opacity="0.82"/>
    <circle cx="125" cy="10" r="0.9" opacity="0.64"/>
    <circle cx="205" cy="42" r="1.6" opacity="0.9"/>
    <circle cx="282" cy="17" r="0.9" opacity="0.7"/>
    <circle cx="375" cy="30" r="1.4" opacity="0.8"/>
    <circle cx="455" cy="7" r="0.9" opacity="0.54"/>
    <circle cx="525" cy="48" r="1.8" opacity="0.9"/>
    <circle cx="612" cy="21" r="0.9" opacity="0.72"/>
    <circle cx="688" cy="38" r="1.4" opacity="0.78"/>
    <circle cx="762" cy="13" r="0.9" opacity="0.62"/>
    <circle cx="842" cy="42" r="1.8" opacity="0.88"/>
    <circle cx="908" cy="25" r="0.9" opacity="0.68"/>
    <circle cx="985" cy="14" r="1.4" opacity="0.82"/>
    <circle cx="1055" cy="46" r="0.9" opacity="0.58"/>
    <circle cx="1135" cy="11" r="1.8" opacity="0.92"/>
    <circle cx="1215" cy="39" r="0.9" opacity="0.68"/>
    <circle cx="1292" cy="22" r="1.4" opacity="0.78"/>
    <circle cx="1398" cy="43" r="0.9" opacity="0.58"/>
    <circle cx="30" cy="85" r="1.4" opacity="0.68"/>
    <circle cx="95" cy="73" r="0.9" opacity="0.52"/>
    <circle cx="172" cy="100" r="1.8" opacity="0.82"/>
    <circle cx="258" cy="68" r="0.9" opacity="0.6"/>
    <circle cx="348" cy="92" r="1.4" opacity="0.72"/>
    <circle cx="428" cy="59" r="0.9" opacity="0.5"/>
    <circle cx="500" cy="108" r="2" opacity="0.88"/>
    <circle cx="582" cy="82" r="0.9" opacity="0.68"/>
    <circle cx="660" cy="65" r="1.4" opacity="0.78"/>
    <circle cx="738" cy="96" r="0.9" opacity="0.58"/>
    <circle cx="818" cy="74" r="1.8" opacity="0.88"/>
    <circle cx="882" cy="58" r="0.9" opacity="0.5"/>
    <circle cx="958" cy="90" r="1.4" opacity="0.68"/>
    <circle cx="1028" cy="74" r="0.9" opacity="0.62"/>
    <circle cx="1108" cy="64" r="1.8" opacity="0.82"/>
    <circle cx="1188" cy="96" r="0.9" opacity="0.68"/>
    <circle cx="1265" cy="78" r="1.4" opacity="0.78"/>
    <circle cx="1375" cy="58" r="0.9" opacity="0.5"/>
  </g>

  <!-- ── Bright accent stars ── -->
  <g filter="url(#iGlow)" fill="white">
    <circle cx="182" cy="52" r="2.6" opacity="0.74"/>
    <circle cx="625" cy="32" r="3" opacity="0.78"/>
    <circle cx="1082" cy="26" r="2.6" opacity="0.72"/>
    <circle cx="1352" cy="76" r="2.6" opacity="0.68"/>
    <circle cx="75" cy="112" r="2.2" opacity="0.68"/>
    <circle cx="445" cy="65" r="2.2" opacity="0.62"/>
  </g>

  <!-- ── SDG badges (top right) ── -->
  <g opacity="0.12">
    <!-- SDG 4 badge -->
    <rect x="1160" y="380" width="58" height="58" rx="6" fill="#C5192D"/>
    <text x="1189" y="418" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle">4</text>
    <!-- SDG 1 badge -->
    <rect x="1235" y="380" width="58" height="58" rx="6" fill="#E5243B"/>
    <text x="1264" y="418" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle">1</text>
    <!-- SDG 13 badge -->
    <rect x="1310" y="380" width="58" height="58" rx="6" fill="#3F7E44"/>
    <text x="1339" y="418" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">13</text>
    <!-- Labels -->
    <text x="1189" y="450" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle" opacity="0.7">QUALITY</text>
    <text x="1189" y="458" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle" opacity="0.7">EDUCATION</text>
    <text x="1264" y="450" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle" opacity="0.7">NO</text>
    <text x="1264" y="458" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle" opacity="0.7">POVERTY</text>
    <text x="1339" y="450" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle" opacity="0.7">CLIMATE</text>
    <text x="1339" y="458" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle" opacity="0.7">ACTION</text>
  </g>

  <!-- ── Dot texture ── -->
  <pattern id="iDots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="0.7" fill="white" opacity="0.04"/>
  </pattern>
  <rect width="1440" height="600" fill="url(#iDots)"/>

  <!-- ── Bottom fade ── -->
  <linearGradient id="iFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="55%" stop-color="#061528" stop-opacity="0"/>
    <stop offset="100%" stop-color="#061528" stop-opacity="0.72"/>
  </linearGradient>
  <rect width="1440" height="600" fill="url(#iFade)"/>
</svg>
