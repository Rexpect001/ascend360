    <radialGradient id="hBlueGlow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#1a4d9e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a4d9e" stop-opacity="0"/>
    </radialGradient>
    <filter id="hBlur30"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="hBlur15"><feGaussianBlur stdDeviation="15"/></filter>
    <filter id="hBlur5"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="hBlur2"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="hStarGlow">
