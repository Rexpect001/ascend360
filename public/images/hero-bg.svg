    <radialGradient id="hGreenGlow" cx="15%" cy="95%" r="55%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="0"/>
