    <radialGradient id="hGoldGlow" cx="88%" cy="10%" r="45%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
