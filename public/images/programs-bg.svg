<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="pBg" x1="0" y1="0" x2="1440" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#04112a"/>
      <stop offset="50%" stop-color="#0c1e42"/>
      <stop offset="100%" stop-color="#051018"/>
    </linearGradient>
    <radialGradient id="pGreen" cx="20%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pCyan" cx="80%" cy="15%" r="45%">
      <stop offset="0%" stop-color="#00BCD4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pOrange" cx="55%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </radialGradient>
    <filter id="pBlur28"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="pBlur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="pBlur3"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="pGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="1440" height="600" fill="url(#pBg)"/>
  <rect width="1440" height="600" fill="url(#pGreen)"/>
  <rect width="1440" height="600" fill="url(#pCyan)"/>
  <rect width="1440" height="600" fill="url(#pOrange)"/>

  <!-- ── Atmospheric glows ── -->
  <ellipse cx="300" cy="580" rx="500" ry="250" fill="#4CAF50" opacity="0.1" filter="url(#pBlur28)"/>
  <ellipse cx="1200" cy="80" rx="400" ry="220" fill="#00BCD4" opacity="0.1" filter="url(#pBlur28)"/>
  <ellipse cx="720" cy="620" rx="600" ry="200" fill="#FF9800" opacity="0.06" filter="url(#pBlur28)"/>

  <!-- ── Stars ── -->
  <g fill="white">
    <circle cx="45" cy="25" r="1.2" opacity="0.82"/>
    <circle cx="122" cy="12" r="0.9" opacity="0.64"/>
    <circle cx="200" cy="44" r="1.6" opacity="0.9"/>
    <circle cx="278" cy="18" r="0.9" opacity="0.7"/>
    <circle cx="372" cy="32" r="1.4" opacity="0.8"/>
    <circle cx="452" cy="8" r="0.9" opacity="0.54"/>
    <circle cx="522" cy="50" r="1.8" opacity="0.9"/>
    <circle cx="608" cy="22" r="0.9" opacity="0.72"/>
    <circle cx="684" cy="40" r="1.4" opacity="0.78"/>
    <circle cx="760" cy="14" r="0.9" opacity="0.62"/>
    <circle cx="840" cy="44" r="1.8" opacity="0.88"/>
    <circle cx="905" cy="28" r="0.9" opacity="0.68"/>
    <circle cx="982" cy="16" r="1.4" opacity="0.82"/>
    <circle cx="1052" cy="48" r="0.9" opacity="0.58"/>
    <circle cx="1132" cy="12" r="1.8" opacity="0.92"/>
    <circle cx="1212" cy="40" r="0.9" opacity="0.68"/>
    <circle cx="1290" cy="24" r="1.4" opacity="0.78"/>
    <circle cx="1395" cy="45" r="0.9" opacity="0.58"/>
    <circle cx="30" cy="88" r="1.4" opacity="0.68"/>
    <circle cx="96" cy="76" r="0.9" opacity="0.52"/>
    <circle cx="172" cy="102" r="1.8" opacity="0.82"/>
    <circle cx="258" cy="70" r="0.9" opacity="0.6"/>
    <circle cx="348" cy="94" r="1.4" opacity="0.72"/>
    <circle cx="428" cy="61" r="0.9" opacity="0.5"/>
    <circle cx="500" cy="110" r="2" opacity="0.88"/>
    <circle cx="582" cy="84" r="0.9" opacity="0.68"/>
    <circle cx="658" cy="67" r="1.4" opacity="0.78"/>
    <circle cx="735" cy="98" r="0.9" opacity="0.58"/>
    <circle cx="815" cy="76" r="1.8" opacity="0.88"/>
    <circle cx="880" cy="60" r="0.9" opacity="0.5"/>
    <circle cx="955" cy="92" r="1.4" opacity="0.68"/>
    <circle cx="1025" cy="76" r="0.9" opacity="0.62"/>
    <circle cx="1105" cy="66" r="1.8" opacity="0.82"/>
    <circle cx="1185" cy="98" r="0.9" opacity="0.68"/>
    <circle cx="1262" cy="80" r="1.4" opacity="0.78"/>
    <circle cx="1372" cy="60" r="0.9" opacity="0.5"/>
    <circle cx="62" cy="155" r="1.4" opacity="0.7"/>
    <circle cx="140" cy="140" r="0.9" opacity="0.5"/>
    <circle cx="220" cy="168" r="1.8" opacity="0.86"/>
    <circle cx="298" cy="134" r="0.9" opacity="0.6"/>
    <circle cx="395" cy="160" r="1.4" opacity="0.76"/>
    <circle cx="475" cy="128" r="0.9" opacity="0.48"/>
    <circle cx="550" cy="176" r="1.8" opacity="0.8"/>
    <circle cx="630" cy="150" r="0.9" opacity="0.66"/>
    <circle cx="705" cy="132" r="1.4" opacity="0.7"/>
    <circle cx="1315" cy="145" r="1.4" opacity="0.76"/>
    <circle cx="1420" cy="170" r="0.9" opacity="0.56"/>
  </g>

  <!-- ── Bright accent stars ── -->
  <g filter="url(#pGlow)" fill="white">
    <circle cx="185" cy="55" r="2.6" opacity="0.74"/>
    <circle cx="622" cy="34" r="3" opacity="0.78"/>
    <circle cx="1085" cy="28" r="2.6" opacity="0.72"/>
    <circle cx="1355" cy="78" r="2.6" opacity="0.68"/>
    <circle cx="76" cy="115" r="2.2" opacity="0.68"/>
    <circle cx="448" cy="68" r="2.2" opacity="0.62"/>
  </g>

  <!-- ── Three SDG pillars (abstract) ── -->

  <!-- Pillar 1: Education (left) — book/graduation -->
  <g opacity="0.14" transform="translate(200, 200)">
    <!-- Hexagon frame -->
    <polygon points="60,0 120,34 120,104 60,138 0,104 0,34" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
    <polygon points="60,15 105,42 105,97 60,124 15,97 15,42" fill="#4CAF50" opacity="0.08"/>
    <!-- Book icon inside -->
    <rect x="28" y="52" width="64" height="48" rx="3" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="60" y1="52" x2="60" y2="100" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="35" y1="65" x2="55" y2="62" stroke="white" stroke-width="1"/>
    <line x1="35" y1="76" x2="55" y2="73" stroke="white" stroke-width="1"/>
    <line x1="35" y1="87" x2="55" y2="84" stroke="white" stroke-width="1"/>
    <line x1="65" y1="62" x2="85" y2="65" stroke="white" stroke-width="1"/>
    <line x1="65" y1="73" x2="85" y2="76" stroke="white" stroke-width="1"/>
    <line x1="65" y1="84" x2="85" y2="87" stroke="white" stroke-width="1"/>
    <!-- SDG 4 label -->
    <rect x="40" y="24" width="40" height="20" rx="3" fill="#C5192D"/>
    <text x="60" y="38" font-family="Arial" font-size="12" font-weight="900" fill="white" text-anchor="middle">SDG 4</text>
  </g>

  <!-- Pillar 2: No Poverty (center) — hands/growth -->
  <g opacity="0.14" transform="translate(660, 180)">
    <polygon points="60,0 120,34 120,104 60,138 0,104 0,34" fill="none" stroke="#FF9800" stroke-width="1.5"/>
    <polygon points="60,15 105,42 105,97 60,124 15,97 15,42" fill="#FF9800" opacity="0.08"/>
    <!-- Rising arrow / upward people -->
    <line x1="60" y1="96" x2="60" y2="55" stroke="white" stroke-width="2" opacity="0.8"/>
    <polyline points="42,68 60,54 78,68" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
    <!-- People symbols -->
    <circle cx="42" cy="80" r="7" fill="none" stroke="white" stroke-width="1.2"/>
    <circle cx="60" cy="75" r="8" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="78" cy="80" r="7" fill="none" stroke="white" stroke-width="1.2"/>
    <!-- SDG 1 label -->
    <rect x="40" y="24" width="40" height="20" rx="3" fill="#E5243B"/>
    <text x="60" y="38" font-family="Arial" font-size="12" font-weight="900" fill="white" text-anchor="middle">SDG 1</text>
  </g>

  <!-- Pillar 3: Climate Action (right) — leaf/earth -->
  <g opacity="0.14" transform="translate(1120, 200)">
    <polygon points="60,0 120,34 120,104 60,138 0,104 0,34" fill="none" stroke="#00BCD4" stroke-width="1.5"/>
    <polygon points="60,15 105,42 105,97 60,124 15,97 15,42" fill="#00BCD4" opacity="0.08"/>
    <!-- Leaf icon -->
    <path d="M 60 95 Q 25 70 35 45 Q 55 25 85 40 Q 95 65 60 95 Z" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="60" y1="95" x2="60" y2="55" stroke="white" stroke-width="1" opacity="0.6"/>
    <line x1="45" y1="72" x2="58" y2="65" stroke="white" stroke-width="0.8" opacity="0.5"/>
    <line x1="50" y1="60" x2="58" y2="55" stroke="white" stroke-width="0.8" opacity="0.5"/>
    <line x1="68" y1="65" x2="75" y2="72" stroke="white" stroke-width="0.8" opacity="0.5"/>
    <!-- SDG 13 label -->
    <rect x="35" y="24" width="50" height="20" rx="3" fill="#3F7E44"/>
    <text x="60" y="38" font-family="Arial" font-size="11" font-weight="900" fill="white" text-anchor="middle">SDG 13</text>
  </g>

  <!-- ── Connecting arcs between pillars ── -->
  <g opacity="0.08" stroke="white" stroke-width="1.2" fill="none">
    <path d="M 380 270 Q 530 220 660 270"/>
    <path d="M 900 270 Q 1020 220 1140 270"/>
    <!-- Orbital rings -->
    <ellipse cx="720" cy="320" rx="500" ry="80"/>
    <ellipse cx="720" cy="320" rx="360" ry="55"/>
  </g>

  <!-- ── Floating particles / dots ascending ── -->
  <g fill="#4CAF50" opacity="0.2">
    <circle cx="150" cy="480" r="4"/>
    <circle cx="175" cy="440" r="3"/>
    <circle cx="140" cy="400" r="2.5"/>
    <circle cx="168" cy="358" r="2"/>
    <circle cx="155" cy="320" r="1.5"/>
    <circle cx="145" cy="288" r="1"/>
  </g>
  <g fill="#FF9800" opacity="0.18">
    <circle cx="1290" cy="480" r="4"/>
    <circle cx="1310" cy="440" r="3"/>
    <circle cx="1285" cy="400" r="2.5"/>
    <circle cx="1300" cy="358" r="2"/>
    <circle cx="1290" cy="318" r="1.5"/>
  </g>
  <g fill="#00BCD4" opacity="0.18">
    <circle cx="720" cy="520" r="5"/>
    <circle cx="735" cy="475" r="3.5"/>
    <circle cx="715" cy="430" r="2.5"/>
    <circle cx="728" cy="388" r="2"/>
    <circle cx="720" cy="348" r="1.5"/>
  </g>

  <!-- ── Dot texture ── -->
  <pattern id="pDots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.7" fill="white" opacity="0.04"/>
  </pattern>
  <rect width="1440" height="600" fill="url(#pDots)"/>

  <!-- ── Bottom fade ── -->
  <linearGradient id="pFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="55%" stop-color="#04112a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#04112a" stop-opacity="0.75"/>
  </linearGradient>
  <rect width="1440" height="600" fill="url(#pFade)"/>
</svg>
